name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install

    - name: Capacitor Sync
      run: |
        npx cap sync ios
        echo "=== Package.swift ==="
        cat ios/App/CapApp-SPM/Package.swift
        echo "=== Checking node_modules ==="
        ls node_modules/@capacitor/ || true

    - name: List Xcode versions
      run: |
        xcode-select -p
        xcodebuild -version
        xcodebuild -project ios/App/App.xcodeproj -list

    - name: Resolve SPM Dependencies
      run: |
        cd ios/App
        xcodebuild -project App.xcodeproj \
          -scheme App \
          -resolvePackageDependencies \
          -clonedSourcePackagesDirPath SPMBuild

    - name: Build iOS Archive
      run: |
        cd ios/App
        xcodebuild \
          -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath build/App.xcarchive \
          -clonedSourcePackagesDirPath SPMBuild \
          archive \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Create IPA
      run: |
        cd ios/App/build
        mkdir -p Payload
        cp -r App.xcarchive/Products/Applications/App.app Payload/
        zip -r EasyTV.ipa Payload
        echo "IPA created:"
        ls -la EasyTV.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: EasyTV-iOS
        path: ios/App/build/EasyTV.ipa
        retention-days: 90
