name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Sync Capacitor iOS
      run: npx cap sync ios

    - name: Build iOS App (unsigned)
      run: |
        cd ios/App
        
        # Build unsigned .app
        xcodebuild \
          -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/App.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          -resolvePackageDependencies

        xcodebuild \
          -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/App.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM=""

    - name: Create IPA
      run: |
        cd ios/App/build
        
        mkdir -p Payload
        cp -r App.xcarchive/Products/Applications/App.app Payload/
        
        # Create unsigned IPA
        zip -r EasyTV.ipa Payload
        
        echo "IPA created successfully!"
        ls -la EasyTV.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: EasyTV-iOS
        path: ios/App/build/EasyTV.ipa
        retention-days: 90
